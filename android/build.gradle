buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

// Windows: node_modules Android build paths exceed MAX_PATH (~260 chars).
// Redirect library build output to a short root (see Notifee verifyReleaseResources failures).
def rnShortBuildRoot = new File("C:/c/comodo-rn-build")
subprojects { subproject ->
    def projectPath = subproject.projectDir.absolutePath.replace('\\', '/')
    if (projectPath.contains('/node_modules/')) {
        subproject.buildDir = new File(rnShortBuildRoot, subproject.name)
    }
}
